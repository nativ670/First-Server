<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Server - Contact</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
    <nav>
        <a href="/" class="logo">MyServer</a>
        <ul class="nav-links">
            <li><a href="/">Home</a></li>
            <li><a href="/about">About</a></li>
            <li><a href="/contact">Contact</a></li>
        </ul>
    </nav>
</header>

<main>
    <h1>Contact Us</h1>
    <form id="contactForm" action="/contact" method="POST" class="contact-form" novalidate>
        <div class="form-group">
            <label for="name">Name</label>
            <input type="text" id="name" name="name" placeholder="Your Name" required>
            <span id="nameError" class="error-message"></span>
        </div>
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="Your Email" required>
            <span id="emailError" class="error-message"></span>
        </div>
        <div class="form-group">
            <label for="message">Message</label>
            <textarea id="message" name="message" placeholder="Your Message" rows="5" required></textarea>
            <span id="messageError" class="error-message"></span>
        </div>
        <button type="submit" class="btn">Send Message</button>
    </form>
</main>

<footer>
    <p>&copy; 2026 MyServer. <a href="https://github.com" target="_blank" rel="noopener noreferrer">GitHub</a></p>
</footer>

<script src="contact.js"></script>

</body>
</html>
